version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sofkian-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sofkianos}
      POSTGRES_USER: ${POSTGRES_USER:-sofkianos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sofkianos_pass}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - sofkian-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sofkianos} -d ${POSTGRES_DB:-sofkianos}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  rabbitmq:
    image: rabbitmq:3-management
    container_name: sofkian-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    networks:
      - sofkian-net
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  producer-api:
    build: ./producer-api
    container_name: sofkianos-producer
    ports:
      - "8082:8082"
    environment:
      SPRING_RABBITMQ_HOST: sofkian-rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - sofkian-net

  consumer-worker:
    build: ./consumer-worker
    container_name: sofkianos-consumer
    ports:
      - "8081:8081"
    environment:
      SPRING_RABBITMQ_HOST: sofkian-rabbitmq
      SPRING_DATASOURCE_URL: jdbc:postgresql://sofkian-postgres:5432/${POSTGRES_DB:-sofkianos}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-sofkianos}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-sofkianos_pass}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - sofkian-net

  log-viewer:
    image: amir20/dozzle:latest
    container_name: sofkianos-log-viewer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8888:8080"
    networks:
      - sofkian-net

networks:
  sofkian-net:
    driver: bridge

volumes:
  postgres-data: