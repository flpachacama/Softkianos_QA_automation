server {
    # Listen on port 80
    listen 80;
    
    # Server name (your domain)
    server_name localhost;
    
    # Root directory where your built files are
    root /usr/share/nginx/html;
    
    # Default file to serve
    index index.html;

    # Serve static files
    location / {
        # Try to serve the file, then directory, then fallback to index.html
        # This is important for React Router to work properly
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets for better performance
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Disable nginx version in headers for security
    server_tokens off;

    # Gzip compression for faster loading
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
