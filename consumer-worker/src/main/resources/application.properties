spring.application.name=consumer-worker

server.port=8081

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Listener: Fair Dispatch (prefetch=1) + concurrent consumers for throughput
spring.rabbitmq.listener.simple.prefetch=1
spring.rabbitmq.listener.simple.concurrency=3
spring.rabbitmq.listener.simple.max-concurrency=5
# OpenAPI / Swagger UI (springdoc)
springdoc.swagger-ui.path=/swagger-ui.html
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sofkianos}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sofkianos}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:sofkianos_pass}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.datasource.hikari.connection-init-sql=SELECT 1
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true