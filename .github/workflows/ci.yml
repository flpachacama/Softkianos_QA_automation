name: CI Sofkianos MVP

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # Common
  JAVA_VERSION: '17'
  NODE_VERSION: '20'
  
  # Integration / E2E
  VITE_API_URL: http://localhost:8080/api # Frontend to Backend
  SPRING_PROFILES_ACTIVE: test

jobs:
  # ========================================================================
  # 1. BACKEND TEST (Unit + Integration with Testcontainers)
  # ========================================================================
  backend-test:
    name: Backend Tests (Java)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      # Test Consumer Worker
      - name: Test Consumer Worker
        working-directory: ./consumer-worker
        run: ./mvnw test

      # Test Producer API (includes Testcontainers)
      # GitHub Actions has Docker enabled by default, so Testcontainers work OOTB.
      - name: Test Producer API
        working-directory: ./producer-api
        run: ./mvnw test

      # Generate Coverage Report (Aggregated if possible, or individual)
      - name: Upload JaCoCo Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: |
            **/target/site/jacoco/
            **/target/surefire-reports/
          retention-days: 1

  # ========================================================================
  # 2. FRONTEND TEST (Unit)
  # ========================================================================
  frontend-test:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run Unit Tests
        working-directory: ./frontend
        run: npm run test:unit # Assumes script "test:unit": "vitest run" exists

      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

  # ========================================================================
  # 3. E2E TEST (Playwright)
  #    Prerequisite: Backend and Frontend must be running
  # ========================================================================
  e2e-test:
    name: E2E Tests (Playwright)
    needs: [backend-test, frontend-test] # Fail fast if unit tests fail
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: mcr.microsoft.com/playwright:v1.41.0-jammy # Pre-installed Playwright dependencies to save time
      options: --user 1001

    services:
      # We need RabbitMQ for the Producer to start up successfully
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
          - 15672:15672
        # Health check to ensure it's ready before steps start
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup Java for Backend execution
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      # Setup Node for Frontend serving and Playwright
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ------------------------------------------------------------------
      # BUILD & START BACKEND
      # ------------------------------------------------------------------
      - name: Build Producer API (Skip tests separately as they ran in prev job)
        working-directory: ./producer-api
        run: ./mvnw package -DskipTests

      - name: Start Backend in Background
        working-directory: ./producer-api
        run: |
          nohup java -jar target/*.jar --spring.rabbitmq.host=rabbitmq > backend.log 2>&1 &
          echo "Waiting for Backend to start..."
          # Simple health check loop (adjust endpoint as needed)
          timeout 60s bash -c 'until curl -s http://localhost:8080/actuator/health | grep UP; do sleep 2; done' || (cat backend.log && exit 1)

      # ------------------------------------------------------------------
      # PREPARE & START FRONTEND
      # ------------------------------------------------------------------
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

      - name: Start Frontend (Preview)
        working-directory: ./frontend
        run: |
          nohup npm run preview -- --port 5173 --strictPort > frontend.log 2>&1 &
          echo "Waiting for Frontend..."
          timeout 30s bash -c 'until curl -s http://localhost:5173; do sleep 1; done'

      # ------------------------------------------------------------------
      # RUN PLAYWRIGHT
      # ------------------------------------------------------------------
      - name: Run Playwright Tests
        working-directory: ./frontend
        env:
          # Point Playwright to the running frontend
          PLAYWRIGHT_TEST_BASE_URL: http://localhost:5173
        run: npx playwright test

      # ------------------------------------------------------------------
      # ARTIFACTS
      # ------------------------------------------------------------------
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
