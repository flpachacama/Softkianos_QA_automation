version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: sofkian-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    networks:
      - sofkian-net
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  producer-api:
    build: ./producer-api
    container_name: sofkianos-producer
    ports:
      - "8082:8082"
    environment:
      SPRING_RABBITMQ_HOST: sofkian-rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - sofkian-net

  consumer-worker:
    build: ./consumer-worker
    container_name: sofkianos-consumer
    ports:
      - "8081:8081"
    environment:
      SPRING_RABBITMQ_HOST: sofkian-rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - sofkian-net

  frontend:
    build: ./frontend
    container_name: sofkianos-frontend
    ports:
      - "5173:5173"
    depends_on:
      - producer-api
    networks:
      - sofkian-net

  log-viewer:
    image: amir20/dozzle:latest
    container_name: sofkianos-log-viewer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8888:8080"
    networks:
      - sofkian-net

networks:
  sofkian-net:
    driver: bridge
